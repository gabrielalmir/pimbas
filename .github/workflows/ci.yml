name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI_DATABASE_URL: postgresql://pimbas:pimbas@localhost:5432/pimbas?schema=public

jobs:
  quality:
    name: Lint, test and build
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pimbas
          POSTGRES_PASSWORD: pimbas
          POSTGRES_DB: pimbas
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: ${{ env.CI_DATABASE_URL }}
      DIRECT_URL: ${{ env.CI_DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bun run db:generate
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build

  dependency-health:
    name: Dependency health
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Scan known vulnerabilities
        run: bunx osv-scanner --lockfile=bun.lock || true

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build image
        run: docker build --build-arg DATABASE_URL="${{ env.CI_DATABASE_URL }}" -t pimbas .
